<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>

<body>
    <header>
        <img src="./css/img/logo.svg" alt="logo">

        <nav>
            <a href="#home">Home</a>
            <a href="">Shop</a>
            <a href="">Plant Care</a>
            <a href="">Blogs</a>
        </nav>

        <div class="btn_section">
            <img src="./css/img/search.svg" alt="search">
            <img src="./css/img/shop.svg" alt="shop">
            <button>
                <img src="./css/img/Logout.svg" alt="cart">
                <span>Login</span>
            </button>
        </div>
    </header>

    <main>
        <section id="home">
            <div class="info-section">
                <h6>Welcome to GreenShop</h6>
                <h1>Let’s Make a Better <span>Planet</span> </h1>
                <p>We are an online plant shop offering a wide range of cheap and trendy plants. Use our plants to
                    create an unique Urban Jungle. Order your favorite plants!</p>
                <button>Shop Now</button>
            </div>
            <div class="img-section">
                <img src="./css/img/main.svg" alt="plant">
            </div>
        </section>
    </main>


    <footer>
    </footer>
</body>

</html>
